syntax = "proto2";
package raccoonai;

import "driver_on_shift.proto";
import "enums.proto";
import "general.proto";
import "google/protobuf/struct.proto";
import "google/protobuf/timestamp.proto";
import "job.proto";
import "organization.proto";
import "truck.proto";
import "user.proto";

option go_package = "./pb";

// to be deprecated
message RouteEventIn {
  required RouteEvent event = 1 [json_name = "event"];
  required uint64 route_id = 2 [json_name = "route_id"];
  optional google.protobuf.Struct payload = 3 [json_name = "payload"];
}

message Route {
  required uint64 id = 1 [json_name = "id"];
  required uint64 owner_organization_id = 3 [json_name = "owner_organization_id"];
  required uint64 driver_on_shift_id = 4 [json_name = "driver_on_shift_id"];
  optional double source_lon = 5 [json_name = "source_lon"];
  optional double source_lat = 6 [json_name = "source_lat"];
  optional double destination_lon = 7 [json_name = "destination_lon"];
  optional double destination_lat = 8 [json_name = "destination_lat"];
  optional uint64 author_id = 9 [json_name = "author_id"];
  optional google.protobuf.Timestamp plan_start_at = 10 [json_name = "plan_start_at"];
  optional google.protobuf.Timestamp plan_end_at = 11 [json_name = "plan_end_at"];
  optional google.protobuf.Timestamp fact_start_at = 12 [json_name = "fact_start_at"];
  optional google.protobuf.Timestamp fact_end_at = 13 [json_name = "fact_end_at"];
  required RouteStatus status = 14 [json_name = "status"];
  required bool created_by_ai = 15 [json_name = "created_by_ai"];
  optional bool is_pseudo = 16 [json_name = "is_pseudo"];
  optional double netto = 17 [json_name = "netto"];
  optional uint64 source_location_id = 18 [json_name = "source_location_id"];
  optional uint64 destination_location_id = 19 [json_name = "destination_location_id"];
  optional uint64 current_step_idx = 20 [json_name = "current_step_idx"];
  optional google.protobuf.Timestamp gps_start_at = 21 [json_name = "gps_start_at"];
  optional google.protobuf.Timestamp gps_end_at = 22 [json_name = "gps_end_at"];
  optional uint64 scale_record_id = 23 [json_name = "scale_record_id"];
  required RouteCategory route_category = 24 [json_name = "route_category"];
  repeated Job jobs = 25 [json_name = "jobs"];
  optional DriverOnShift driver_on_shift = 26 [json_name = "driver_on_shift"];
  optional uint64 reward = 27 [json_name = "reward"];
  optional double design_duration = 28 [json_name = "design_duration"];
  optional ScaleRecord scale_record = 29 [json_name = "scale_record"];

  required google.protobuf.Timestamp created_at = 101 [json_name = "created_at"];
  optional google.protobuf.Timestamp updated_at = 102 [json_name = "updated_at"];
}

// ScaleRecord and RawScaleRecord live here (rather than in scale_service.proto)
// because Route and ScaleRecord reference each other; mutual references must
// share a file to avoid a circular import between route.proto and
// scale_service.proto.
// TODO: refactor this, probably making separate file for all model messages to avoid circular imports.
message ScaleRecord {
  required uint64 id = 1 [json_name = "id"];
  required Organization owner_organization = 2 [json_name = "owner_organization"];
  required Organization service_provider = 3 [json_name = "service_provider"];
  required double brutto_weight_kg = 4 [json_name = "brutto_weight_kg"];
  required google.protobuf.Timestamp brutto_scale_ts = 5 [json_name = "brutto_scale_ts"];
  optional double netto_weight_kg = 6 [json_name = "netto_weight_kg"];
  optional google.protobuf.Timestamp netto_scale_ts = 7 [json_name = "netto_scale_ts"];
  optional double volume = 8 [json_name = "volume"];
  optional bool is_guest_record = 9 [json_name = "is_guest_record"];
  required WasteType waste_type = 10 [json_name = "waste_type"];
  required Truck truck = 11 [json_name = "truck"];
  optional User driver = 12 [json_name = "driver"];
  optional Route route = 13 [json_name = "route"];
  optional string integration_comments = 14 [json_name = "integration_comments"];
  optional RawScaleRecord origin = 15 [json_name = "origin"];
  repeated string photos = 16 [json_name = "photos"];
}

message RawScaleRecord {
  required uint64 id = 1 [json_name = "id"];
  required uint64 legacy_id = 2 [json_name = "legacy_id"];
  optional string truck_number = 3 [json_name = "truck_number"];
  optional string driver_full_name = 4 [json_name = "driver_full_name"];
  optional google.protobuf.Timestamp first_time_scaled_at = 5 [json_name = "first_time_scaled_at"];
  optional google.protobuf.Timestamp second_time_scaled_at = 6 [json_name = "second_time_scaled_at"];
  optional double brutto_kg = 7 [json_name = "brutto_kg"];
  optional double netto_kg = 8 [json_name = "netto_kg"];
  optional double tare_kg = 9 [json_name = "tare_kg"];
  optional double volume = 10 [json_name = "volume"];
  optional string waste_type = 11 [json_name = "waste_type"];
  optional string sender = 12 [json_name = "sender"];
  optional string receiver = 13 [json_name = "receiver"];
  optional string bin = 14 [json_name = "bin"];
  repeated string photos = 15 [json_name = "photos"];

  optional string product_code = 16 [json_name = "product_code"]; // Код номенклатуры в 1С (продукция)
  optional string sender_code = 17 [json_name = "sender_code"]; // Код контрагента в 1С (поставщик)
  optional string receiver_code = 18 [json_name = "receiver_code"]; // Код контрагента в 1С (получатель)
  optional string invoice_num = 19 [json_name = "invoice_num"]; // Номер накладной(с весовой)
  optional string operation_code = 20 [json_name = "operation_code"]; // Код операции с 1С
  optional string document_invoice_num = 21 [json_name = "document_invoice_num"]; // Номер накладной(от поставщика по документам)
  optional double document_brutto_kg = 22 [json_name = "document_brutto_kg"]; // Брутто по документам(поставщика)
  optional double document_netto_kg = 23 [json_name = "document_netto_kg"]; // Нетто по документам(поставщика)
  optional double document_tare_kg = 24 [json_name = "document_tare_kg"]; // Тара по документам(поставщика)
  optional double document_volume = 25 [json_name = "document_volume"]; // Объем по документам(поставщика)
  optional string permit_num = 26 [json_name = "permit_num"]; // Номер пропуска
  optional string order_num = 27 [json_name = "order_num"]; // Номер заказа
  optional string seal_num = 28 [json_name = "seal_num"]; // Номер пломбы
  optional string scale_net_num = 29 [json_name = "scale_net_num"]; // Сетевой номер автовесов
  optional string delete_mark = 30 [json_name = "delete_mark"]; // Метка на удаление записи
  optional string commentary = 31 [json_name = "commentary"]; // Комментарий
  optional double weight1 = 32 [json_name = "weight1"]; // Вес при первом завесе
  optional double weight2 = 33 [json_name = "weight2"]; // Вес при втором завесе
  optional double humidity = 34 [json_name = "humidity"]; // Влажность
  optional double nettomodif = 35 [json_name = "nettomodif"]; // Чистый вес нетто с учетом тары и влажности
}

message RouteCreate {
  optional uint64 owner_organization_id = 1 [json_name = "owner_organization_id"]; // to be required
  required uint64 driver_on_shift_id = 2 [json_name = "driver_on_shift_id"];
  required double source_lon = 3 [json_name = "source_lon"];
  required double source_lat = 4 [json_name = "source_lat"];
  required double destination_lon = 5 [json_name = "destination_lon"];
  required double destination_lat = 6 [json_name = "destination_lat"];
  optional uint64 author_id = 7 [json_name = "author_id"];
  optional google.protobuf.Timestamp plan_start_at = 8 [json_name = "plan_start_at"];
  optional google.protobuf.Timestamp plan_end_at = 9 [json_name = "plan_end_at"];
  optional bool created_by_ai = 10 [json_name = "created_by_ai"];
  optional bool is_pseudo = 11 [json_name = "is_pseudo"];
  optional double netto = 12 [json_name = "netto"];
  optional uint64 source_location_id = 13 [json_name = "source_location_id"];
  required uint64 destination_location_id = 14 [json_name = "destination_location_id"];
  required RouteCategory route_category = 15 [json_name = "route_category"];
}

message RouteUpdate {
  required uint64 id = 1 [json_name = "id"];
  optional uint64 owner_organization_id = 2 [json_name = "owner_organization_id"]; // to be required
  optional uint64 driver_on_shift_id = 3 [json_name = "driver_on_shift_id"];
  optional double source_lon = 4 [json_name = "source_lon"];
  optional double source_lat = 5 [json_name = "source_lat"];
  optional double destination_lon = 7 [json_name = "destination_lon"];
  optional double destination_lat = 8 [json_name = "destination_lat"];
  optional google.protobuf.Timestamp plan_start_at = 9 [json_name = "plan_start_at"]; // todo deprecate start/end updates
  optional google.protobuf.Timestamp plan_end_at = 10 [json_name = "plan_end_at"];
  optional google.protobuf.Timestamp fact_start_at = 11 [json_name = "fact_start_at"];
  optional google.protobuf.Timestamp fact_end_at = 12 [json_name = "fact_end_at"];
  optional RouteStatus status = 13 [json_name = "status"]; // to be deprecated
  optional bool is_pseudo = 14 [json_name = "is_pseudo"]; // to be deprecated
  optional double netto = 15 [json_name = "netto"]; // to be deprecated
  optional uint64 source_location_id = 16 [json_name = "source_location_id"]; // to be deprecated
  optional uint64 destination_location_id = 17 [json_name = "destination_location_id"];
  optional uint64 current_step_idx = 18 [json_name = "current_step_idx"]; // to be deprecated
  optional google.protobuf.Timestamp gps_start_at = 19 [json_name = "gps_start_at"];
  optional google.protobuf.Timestamp gps_end_at = 20 [json_name = "gps_end_at"]; // to be deprecated
  optional RouteCategory route_category = 21 [json_name = "route_category"]; // to be deprecated
}

message RouteCreateWithJobsRequest { // deprecate and move to route create once migration from old BE finishes
  required RouteCreate create = 1 [json_name = "create"];
  required uint64 owner_organization_id = 2 [json_name = "owner_organization_id"];
  repeated uint64 job_ids = 10 [json_name = "job_ids"];
}

message RouteListRequest {
  optional DateTimeFilter datetime_filter = 1 [json_name = "datetime_filter"];
  optional ListFilter list_filter = 2 [json_name = "list_filter"];
  repeated uint64 owner_organization_ids = 3 [json_name = "owner_organization_ids"];
  repeated uint64 driver_on_shift_ids = 4 [json_name = "driver_on_shift_ids"];
  optional uint64 driver_id = 5 [json_name = "driver_id"];
  optional uint64 truck_id = 6 [json_name = "truck_id"];
  optional RouteStatus route_status = 7 [json_name = "route_status"];
  optional JobType job_type = 8 [json_name = "job_type"];
  optional RouteCategory route_category = 9 [json_name = "route_category"];
}

message RouteList {
  optional ListInfo list_info = 1 [json_name = "list_info"];
  repeated Route routes = 2 [json_name = "routes"];
}

message RouteIdRequest {
  required uint64 id = 1 [json_name = "id"];
  required uint64 owner_organization_id = 2 [json_name = "owner_organization_id"];
}

message RouteUpdateWithJobsRequest { // deprecate and move to route update once migration from old BE finishes
  required RouteUpdate route = 1 [json_name = "route"];
  repeated uint64 job_ids = 2 [json_name = "job_ids"];
  required uint64 owner_organization_id = 3 [json_name = "owner_organization_id"];
}

message RouteForceCompleteRequest {
  required uint64 id = 1 [json_name = "id"];
  repeated uint64 jobs_to_complete = 2 [json_name = "jobs_to_complete"];
  repeated uint64 jobs_to_unassign = 3 [json_name = "jobs_to_unassign"];
  required uint64 owner_organization_id = 4 [json_name = "owner_organization_id"];
}

message RouteCancelRequest {
  required uint64 id = 1 [json_name = "id"];
  repeated uint64 jobs_to_cancel = 2 [json_name = "jobs_to_cancel"];
  repeated uint64 jobs_to_unassign = 3 [json_name = "jobs_to_unassign"];
  required uint64 owner_organization_id = 4 [json_name = "owner_organization_id"];
}

message MoveJobsBetweenRoutesRequest {
  required uint64 source_route_id = 1 [json_name = "source_route_id"];
  required uint64 destination_route_id = 2 [json_name = "destination_route_id"];
  repeated uint64 job_ids = 3 [json_name = "job_ids"];
  required uint64 owner_organization_id = 4 [json_name = "owner_organization_id"];
}

message ChangeRouteDriverOnShiftRequest {
  required uint64 route_id = 1 [json_name = "route_id"];
  required uint64 driver_on_shift_id = 2 [json_name = "driver_on_shift_id"];
  required uint64 owner_organization_id = 3 [json_name = "owner_organization_id"];
}

message CreateRouteFromPickupLocationGroupRequest {
  required uint64 pickup_location_group_id = 1 [json_name = "pickup_location_group_id"];
  required google.protobuf.Timestamp date = 2 [json_name = "date"];
  required uint64 owner_organization_id = 3 [json_name = "owner_organization_id"];
}
