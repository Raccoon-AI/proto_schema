syntax = "proto2";
package raccoonai;

import "google/protobuf/struct.proto";
import "google/protobuf/timestamp.proto";
import "organization.proto";
import "pickup_location.proto";

option go_package = "./pb";

message GovGeoAccess {
  required uint64 id = 1 [json_name = "id"];
  required string area_name = 2 [json_name = "area_name"];
  required uint64 organization_id = 3 [json_name = "organization_id"];
  repeated Organization service_providers = 4 [json_name = "service_providers"];
  repeated PickupLocation pickup_locations = 5 [json_name = "pickup_locations"];
  repeated Organization disposal_sites = 6 [json_name = "disposal_sites"];
  repeated google.protobuf.Struct geometry = 7 [json_name = "geometry"];
  required google.protobuf.Timestamp created_at = 8 [json_name = "created_at"];
  required google.protobuf.Timestamp updated_at = 9 [json_name = "updated_at"];
  repeated Organization service_receivers = 10 [json_name = "service_receivers"];
}

message GovGeoAccessList {
  repeated GovGeoAccess gov_geo_accesses = 1 [json_name = "gov_geo_accesses"];
}

message GovGeoAccessCreate {
  required string area_name = 1 [json_name = "area_name"];
  required uint64 organization_id = 2 [json_name = "organization_id"];
  repeated google.protobuf.Struct geometry = 3 [json_name = "geometry"];
}

message GovGeoAccessUpdate {
  required uint64 id = 1 [json_name = "id"];
  required string area_name = 2 [json_name = "area_name"];
  required uint64 organization_id = 3 [json_name = "organization_id"];
  repeated Organization service_providers = 4 [json_name = "service_providers"];
  repeated PickupLocation pickup_locations = 5 [json_name = "pickup_locations"];
  repeated Organization disposal_sites = 6 [json_name = "disposal_sites"];
  repeated google.protobuf.Struct geometry = 7 [json_name = "geometry"];
  required google.protobuf.Timestamp created_at = 8 [json_name = "created_at"];
  required google.protobuf.Timestamp updated_at = 9 [json_name = "updated_at"];
  repeated Organization receivers = 10 [json_name = "receivers"];
}

message GovGeoAccessAssociationRequest {
  required uint64 gov_geo_access_id = 1 [json_name = "gov_geo_access_id"];
  repeated uint64 organization_ids = 2 [json_name = "organization_ids"];
}
