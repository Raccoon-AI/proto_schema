syntax = "proto2";

package raccoonai;

import "driver_on_shift.proto";
import "enums.proto";
import "general.proto";
import "organization.proto";
import "route.proto";
import "truck.proto";

option go_package = "./pb";

message SearchTruckRequest {
  required string plate_number = 1 [json_name = "plate_number"];
}

message SearchTruckResult {
  optional bool is_guest = 1 [json_name = "is_guest"];
  optional Truck truck = 2 [json_name = "truck"];
  optional Organization org = 3 [json_name = "org"];
}

message SearchTruckResponse {
  repeated SearchTruckResult results = 1 [json_name = "results"];
}

message TruckListRequest {
  repeated uint64 owner_organization_ids = 1 [json_name = "owner_organization_ids"]; // filter by org
  repeated TruckType types = 2 [json_name = "type"]; // filter by truck type
  repeated uint64 truck_type_ids = 3 [json_name = "custom_truck_type_ids"]; // filter by custom truck type
  repeated JobType job_types = 4 [json_name = "job_types"]; // filter by job types
  repeated uint64 container_type_ids = 5 [json_name = "container_type_ids"]; // filter by container types (for trucks with specific container compatibility)
}

message TruckListResponse {
  repeated Truck trucks = 1 [json_name = "trucks"];
}

message CreateGuestTruckRequest {
  required uint64 owner_organization_id = 1 [json_name = "owner_organization_id"];
  required string plate_number = 2 [json_name = "plate_number"];
  required TruckType type = 3 [json_name = "type"];
}

message TruckWeightRequest {
  required uint64 id = 1 [json_name = "id"];
  required double truck_weight = 2 [json_name = "truck_weight"];
}

message CustomTruckTypeListRequest {
  repeated uint64 owner_organization_ids = 1 [json_name = "owner_organization_ids"];
  repeated TruckType types = 2 [json_name = "type"]; // filter by truck type
  repeated JobType job_types = 3 [json_name = "job_types"]; // filter by job types
  repeated uint64 container_type_ids = 5 [json_name = "container_type_ids"]; // filter by container types
}

message CurrentTruckStatus {
  required Truck truck = 1 [json_name = "truck"];
  optional DriverOnShift current_shift = 2 [json_name = "current_shift"];
  optional DriverOnShift latest_shift = 3 [json_name = "latest_shift"];
  optional Route current_route = 4 [json_name = "current_route"];
}

message CurrentTruckStatusList {
  repeated CurrentTruckStatus truck_statuses = 1 [json_name = "truck_statuses"];
}

service TruckService {
  rpc SearchTruck(SearchTruckRequest) returns (SearchTruckResponse) {}
  rpc TruckList(TruckListRequest) returns (TruckListResponse) {}
  rpc CreateGuestTruck(CreateGuestTruckRequest) returns (Truck) {}
  rpc UpdateTruckWeight(TruckWeightRequest) returns (Truck) {}
  rpc CreateTruck(TruckCreate) returns (Truck) {}
  rpc UpdateTruck(TruckUpdate) returns (Truck) {}
  rpc GetTruckById(IdRequest) returns (Truck) {}
  rpc DeleteTruckById(IdRequest) returns (MessageResponse) {}
  rpc AllTruckStatuses(TruckListRequest) returns (CurrentTruckStatusList) {}

  rpc CreateTruckType(CustomTruckTypeCreate) returns (CustomTruckType) {}
  rpc GetTruckTypeById(IdRequest) returns (CustomTruckType) {}
  rpc UpdateTruckType(CustomTruckTypeUpdate) returns (CustomTruckType) {}
  rpc DeleteTruckType(IdRequest) returns (MessageResponse) {}
  rpc ListTruckTypes(CustomTruckTypeListRequest) returns (CustomTruckTypeList) {}
}
