syntax = "proto2";
package raccoonai;

import "enums.proto";
import "general.proto";
import "google/protobuf/timestamp.proto";

option go_package = "./pb";

enum AnalyticsMetric {
  ANALYTICS_METRIC_UNDEFINED = 0;
  ANALYTICS_METRIC_JOBS_ORDERED = 1;
  ANALYTICS_METRIC_JOBS_COMPLETED = 2;
  ANALYTICS_METRIC_REVENUE = 3;
}

enum TimeGranularity {
  TIME_GRANULARITY_UNDEFINED = 0;
  TIME_GRANULARITY_DAY = 1;
  TIME_GRANULARITY_WEEK = 2; // server-side bucketing (removes client weekly aggregation)
}

// Only DRIVER is live (drivers_summary_for_period). Job/route category and review-status
enum BreakdownDimension {
  BREAKDOWN_DIMENSION_UNDEFINED = 0;
  BREAKDOWN_DIMENSION_DRIVER = 1; // was: drivers_summary_for_period (per-driver zone counts + shifts)
}

message AnalyticsFilter {
  optional uint64 driver_id = 1 [json_name = "driver_id"];     // completed_jobs, drivers_summary
  optional uint64 location_id = 2 [json_name = "location_id"]; // jobs_ordered
}

message TimeSeriesBucket {
  required string bucket_start = 1 [json_name = "bucket_start"]; // YYYY-MM-DD
  required double value = 2 [json_name = "value"];
}

message BreakdownRow {
  required string key = 1 [json_name = "key"];            // dimension key (driver id, enum value, zone)
  optional string label = 2 [json_name = "label"];        // resolved label (driver name, category name)
  required double value = 3 [json_name = "value"];        // primary metric value
  map<string, double> extra = 4 [json_name = "extra"];    // computed extras (reward, avg_zone, total_shifts...)
}

message JobRegistryRow {
  optional uint64 job_id = 1 [json_name = "job_id"];
  optional string plate_number = 2 [json_name = "plate_number"];
  optional string driver_fullname = 3 [json_name = "driver_fullname"];
  optional google.protobuf.Timestamp completed_at = 4 [json_name = "completed_at"];
  optional JobCategory category = 5 [json_name = "category"];
  optional string pickup_location = 6 [json_name = "pickup_location"];
  optional string receiver = 7 [json_name = "receiver"];
  optional double netto = 8 [json_name = "netto"];
  optional double volume = 9 [json_name = "volume"];
  optional double tariff = 10 [json_name = "tariff"];
  optional double sum = 11 [json_name = "sum"];
}