syntax = "proto2";
package raccoonai;

import "general.proto";
import "pickup_location.proto";

option go_package = "./pb";

message PickupLocationRequest {
  required uint64 id = 1 [json_name = "id"];
  required uint64 service_provider_id = 2 [json_name = "service_provider_id"];
}

message PickupLocationListRequest {
  repeated uint64 service_provider_ids = 1 [json_name = "service_provider_ids"];
  repeated uint64 service_receiver_ids = 2 [json_name = "service_receiver_ids"];
  optional ListFilter list_filter = 10 [json_name = "list_filter"];
}

message ContainerGroupJobLink {
  required uint64 container_group_id = 1 [json_name = "container_group_id"];
  required string job_type = 2 [json_name = "job_type"];
}

message BindContainerGroupsRequest {
  required uint64 pickup_location_group_id = 1 [json_name = "pickup_location_group_id"];
  repeated ContainerGroupJobLink links = 2 [json_name = "links"];
}

message RemoveContainerGroupRequest {
  required uint64 container_group_id = 1 [json_name = "container_group_id"];
  required uint64 pickup_location_group_id = 2 [json_name = "pickup_location_group_id"];
  required string job_type = 3 [json_name = "job_type"];
}

message PickupLocationListToContractRequest {
  repeated uint64 pickup_location_ids = 1 [json_name = "pickup_location_ids"];
  required uint64 contract_id = 2 [json_name = "contract_id"];
}

message PickupLocationGroupRequest {
  required uint64 id = 1 [json_name = "id"];
  required uint64 owner_organization_id = 2 [json_name = "owner_organization_id"];
}

message PickupLocationGroupListRequest {
  repeated uint64 owner_organization_ids = 1 [json_name = "owner_organization_ids"];
  optional ListFilter list_filter = 10 [json_name = "list_filter"];
}

service PickupLocationService {
  // Pickup Location operations
  rpc CreatePickupLocation(PickupLocationCreate) returns (PickupLocation) {}
  rpc GetPickupLocationById(PickupLocationRequest) returns (PickupLocation) {}
  rpc UpdatePickupLocation(PickupLocationUpdate) returns (PickupLocation) {}
  rpc DeletePickupLocation(PickupLocationRequest) returns (MessageResponse) {}
  rpc ListPickupLocations(PickupLocationListRequest) returns (PickupLocationList) {}
  // @todeprecate
  rpc BindPickupLocationListToContract(PickupLocationListToContractRequest) returns (MessageResponse) {}

  // Pickup Location Group operations
  rpc CreatePickupLocationGroup(PickupLocationGroupCreate) returns (PickupLocationGroup) {}
  rpc GetPickupLocationGroupById(PickupLocationGroupRequest) returns (PickupLocationGroup) {}
  rpc ListPickupLocationGroups(PickupLocationGroupListRequest) returns (PickupLocationGroupList) {}
  rpc UpdatePickupLocationGroup(PickupLocationGroupUpdate) returns (PickupLocationGroup) {}
  rpc DeletePickupLocationGroup(PickupLocationGroupRequest) returns (MessageResponse) {}

  rpc BindContainerGroupsToPickupLocationGroup(BindContainerGroupsRequest) returns (MessageResponse) {}
  rpc UnbindContainerGroupFromPickupLocationGroup(RemoveContainerGroupRequest) returns (MessageResponse) {}
}
