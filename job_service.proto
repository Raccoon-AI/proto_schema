syntax = "proto2";
package raccoonai;

import "enums.proto";
import "general.proto";
import "job.proto";

option go_package = "./pb";

message JobListRequest {
  repeated uint64 service_receiver_ids = 1 [json_name = "service_receiver_ids"];
  repeated uint64 service_provider_ids = 2 [json_name = "service_provider_ids"];
  repeated JobType job_type = 3 [json_name = "job_type"];
  repeated JobCategory job_category = 4 [json_name = "job_category"];
  repeated JobStatus job_status = 5 [json_name = "job_status"];
  optional uint64 driver_id = 6 [json_name = "driver_id"];
  optional uint64 truck_id = 7 [json_name = "truck_id"];
  optional ListFilter list_filter = 10 [json_name = "list_filter"];
  optional DateTimeFilter time_filter = 11 [json_name = "time_filter"];
  repeated uint64 pickup_location_ids = 12 [json_name = "pickup_location_ids"];
}

message JobRequest {
  required uint64 id = 1 [json_name = "id"];
  required uint64 service_receiver_id = 2 [json_name = "service_receiver_id"];
  required uint64 service_provider_id = 3 [json_name = "service_provider_id"];
}

message OperationTwJobListRequest {
  repeated uint64 service_provider_ids = 1 [json_name = "service_provider_ids"];
}

service JobService {
  rpc CreateJob(JobCreate) returns (Job) {}
  rpc GetJobById(JobRequest) returns (Job) {}
  rpc UpdateJob(JobUpdate) returns (Job) {}
  rpc ListJobs(JobListRequest) returns (JobList) {}
  rpc ListOperationTimeWindowJobs(OperationTwJobListRequest) returns (JobList) {}
  rpc CancelJob(JobRequest) returns (Job) {}
  rpc ForceCompleteJob(JobRequest) returns (Job) {}
}
