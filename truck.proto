syntax = "proto2";
package raccoonai;

import "container.proto";
import "enums.proto";
import "general.proto";
import "google/protobuf/timestamp.proto";
import "organization.proto";

option go_package = "./pb";

message Truck {
  required uint64 id = 1 [json_name = "id"];
  optional TruckType type = 3 [json_name = "type"]; // To be deprecated in favor of truck_type.type
  required string plate_number = 4 [json_name = "plate_number"];
  required TruckStatus status = 5 [json_name = "status"];
  required uint64 owner_organization_id = 6 [json_name = "owner_organization_id"];
  optional string model = 7 [json_name = "model"]; // To be deprecated in favor of truck_type.model
  optional double truck_weight = 8 [json_name = "truck_weight"]; // To be deprecated in favor of truck_type.weight_kg
  optional google.protobuf.Timestamp last_weight_ts = 9 [json_name = "last_weight_ts"];
  optional uint64 capacity = 10 [json_name = "capacity"]; // To be deprecated in favor of truck_type.volume
  optional uint32 year = 11 [json_name = "year"];
  optional string color = 12 [json_name = "color"];
  optional CustomTruckType truck_type = 13 [json_name = "truck_type"];
  optional string tech_passport = 14 [json_name = "tech_passport"];
  optional Organization owner_organization = 15 [json_name = "owner_organization"];

  optional google.protobuf.Timestamp created_at = 101 [json_name = "created_at"];
  optional google.protobuf.Timestamp updated_at = 102 [json_name = "updated_at"];
}

message TruckCreate {
  optional uint64 owner_organization_id = 1 [json_name = "owner_organization_id"]; // to be required
  required string plate_number = 2 [json_name = "plate_number"];
  optional TruckType type = 3 [json_name = "type"]; // To be deprecated
  optional string model = 4 [json_name = "model"]; // To be deprecated
  optional double truck_weight = 5 [json_name = "truck_weight"];
  optional uint64 capacity = 6 [json_name = "capacity"]; // To be deprecated
  optional uint32 year = 7 [json_name = "year"];
  optional string color = 8 [json_name = "color"];
  optional uint64 truck_type_id = 9 [json_name = "truck_type_id"]; // To be required
  optional string tech_passport = 10 [json_name = "tech_passport"];
}

message TruckUpdate {
  required uint64 id = 1 [json_name = "id"];
  optional uint64 owner_organization_id = 2 [json_name = "owner_organization_id"]; // to be required
  optional TruckType type = 3 [json_name = "type"]; // To be deprecated
  optional string plate_number = 4 [json_name = "plate_number"];
  optional TruckStatus status = 5 [json_name = "status"];
  optional string model = 6 [json_name = "model"]; // To be deprecated
  optional double truck_weight = 7 [json_name = "truck_weight"];
  optional uint64 capacity = 8 [json_name = "capacity"]; // To be deprecated
  optional uint32 year = 9 [json_name = "year"];
  optional string color = 10 [json_name = "color"]; // To be deprecated
  optional uint64 truck_type_id = 11 [json_name = "truck_type_id"];
  optional string tech_passport = 12 [json_name = "tech_passport"];
}

message TruckStatusUpdate {
  required uint64 id = 1 [json_name = "id"];
  required TruckStatus status = 2 [json_name = "status"];
}

// To be deprecated
message TruckInProximity {
  required uint64 id = 1 [json_name = "id"];
  required uint64 provider_org_id = 2 [json_name = "provider_org_id"];
  required uint64 location_id = 3 [json_name = "location_id"];
  required string location_type = 4 [json_name = "location_type"]; // "pickup_location" or "location"
  required int64 start_ts = 5 [json_name = "start_ts"];
  required int64 end_ts = 6 [json_name = "end_ts"];
}

message TruckCapability {
  required ContainerType container_type = 1 [json_name = "container_type"];
  required JobType job_type = 2 [json_name = "job_type"];
}

message TruckCapabilityUpsert {
  required uint64 container_type_id = 1 [json_name = "container_type_id"];
  required JobType job_type = 2 [json_name = "job_type"];
}

message CustomTruckType {
  required uint64 id = 1 [json_name = "id"];
  required uint64 owner_organization_id = 2 [json_name = "owner_organization_id"];
  required string name = 3 [json_name = "name"];
  required string manufacturer = 4 [json_name = "manufacturer"];
  required string model = 5 [json_name = "model"];
  required float volume = 6 [json_name = "volume"];
  optional double weight_kg = 7 [json_name = "weight_kg"]; // might not be needed
  optional float compaction_factor = 8 [json_name = "compaction_factor"];
  optional TruckType type = 9 [json_name = "type"];
  repeated TruckCapability truck_type_capabilities = 10 [json_name = "truck_type_capabilities"];
  optional TruckLoadType load_type = 11 [json_name = "load_type"];
  optional TruckStandard euro_type = 12 [json_name = "euro_type"];
  optional uint32 truck_count = 13 [json_name = "truck_count"];

  optional google.protobuf.Timestamp created_at = 101 [json_name = "created_at"];
  optional google.protobuf.Timestamp updated_at = 102 [json_name = "updated_at"];
}

message CustomTruckTypeCreate {
  required uint64 owner_organization_id = 1 [json_name = "owner_organization_id"];
  required string name = 2 [json_name = "name"];
  required string manufacturer = 3 [json_name = "manufacturer"];
  required string model = 4 [json_name = "model"];
  required float volume = 5 [json_name = "volume"];
  optional double weight_kg = 6 [json_name = "weight_kg"];
  optional float compaction_factor = 7 [json_name = "compaction_factor"];
  optional TruckType type = 8 [json_name = "type"];
  repeated TruckCapabilityUpsert truck_type_capabilities = 9 [json_name = "truck_type_capabilities_upsert"];
  optional TruckLoadType load_type = 10 [json_name = "load_type"];
  optional TruckStandard euro_type = 11 [json_name = "euro_type"];
}

message CustomTruckTypeUpdate {
  required uint64 id = 1 [json_name = "id"];
  optional uint64 owner_organization_id = 2 [json_name = "owner_organization_id"]; // to be required
  required string name = 3 [json_name = "name"];
  optional string manufacturer = 4 [json_name = "manufacturer"];
  optional string model = 5 [json_name = "model"];
  optional float volume = 6 [json_name = "volume"];
  optional double weight_kg = 7 [json_name = "weight_kg"];
  optional float compaction_factor = 8 [json_name = "compaction_factor"];
  optional TruckType type = 9 [json_name = "type"];
  repeated TruckCapabilityUpsert truck_type_capabilities = 10 [json_name = "truck_type_capabilities_upsert"];
  // If true, existing capabilities not included in the request will be deleted.
  // If false, existing capabilities will be retained and only upserted/updated.
  optional bool to_update_matrix = 11 [
    default = true,
    json_name = "update_matrix"
  ];
  optional TruckLoadType load_type = 12 [json_name = "load_type"];
  optional TruckStandard euro_type = 13 [json_name = "euro_type"];
}

message CustomTruckTypeList {
  repeated CustomTruckType custom_truck_types = 1 [json_name = "custom_truck_types"];
  optional ListInfo list_info = 2 [json_name = "list_info"];
}
