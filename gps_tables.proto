syntax = "proto2";
package raccoonai;

import "google/protobuf/struct.proto";
import "google/protobuf/timestamp.proto";
import "organization.proto";
import "truck.proto";

option go_package = "./pb";

message GpsStop {
  required uint64 id = 1 [json_name = "id"];
  required google.protobuf.Timestamp created_at = 2 [json_name = "created_at"];
  required google.protobuf.Timestamp updated_at = 3 [json_name = "updated_at"];
  required uint64 owner_organization_id = 4 [json_name = "owner_organization_id"];
  optional uint64 location_id = 5 [json_name = "location_id"];
  optional uint64 pickup_location_id = 6 [json_name = "pickup_location_id"];
  optional uint64 gps_route_id = 7 [json_name = "gps_route_id"];
  required uint64 truck_id = 8 [json_name = "truck_id"];
  required double lon = 9 [json_name = "lon"];
  required double lat = 10 [json_name = "lat"];
  required uint64 num_gps_points = 11 [json_name = "num_gps_points"];
  required double average_speed_kmph = 12 [json_name = "average_speed_kmph"];
  optional google.protobuf.Struct meta = 13 [json_name = "meta"]; // JSON stored as string
  required uint64 step_idx = 14 [json_name = "step_idx"];
  required google.protobuf.Timestamp gps_start_at = 15 [json_name = "gps_start_at"];
  required google.protobuf.Timestamp gps_end_at = 16 [json_name = "gps_end_at"];
  optional Truck truck = 17 [json_name = "truck"];
  optional Organization owner_organization = 18 [json_name = "owner_organization"];
}

message GpsStopList {
  repeated GpsStop gps_stops = 1 [json_name = "gps_stops"];
}

message GpsRoute {
  required uint64 id = 1 [json_name = "id"];
  required google.protobuf.Timestamp created_at = 2 [json_name = "created_at"];
  required google.protobuf.Timestamp updated_at = 3 [json_name = "updated_at"];
  required uint64 owner_organization_id = 4 [json_name = "owner_organization_id"];
  optional google.protobuf.Struct meta = 5 [json_name = "meta"]; // JSON stored as string
  required google.protobuf.Timestamp gps_start_at = 6 [json_name = "gps_start_at"];
  required google.protobuf.Timestamp gps_end_at = 7 [json_name = "gps_end_at"];
  required uint64 truck_id = 8 [json_name = "truck_id"];
}
