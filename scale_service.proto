syntax = "proto2";

package raccoonai;

import "enums.proto";
import "general.proto";
import "google/protobuf/timestamp.proto";
import "route.proto"; // ScaleRecord and RawScaleRecord are defined in route.proto

option go_package = "./pb";

message ScaleBruttoRequest {
  required uint64 owner_organization_id = 1 [json_name = "owner_organization_id"];
  required uint64 truck_id = 2 [json_name = "truck_id"];
  required uint64 driver_id = 3 [json_name = "driver_id"];
  required double weight_kg = 4 [json_name = "weight_kg"];
  required WasteType waste_type = 5 [json_name = "waste_type"];
  optional double volume = 6 [json_name = "volume"];
  optional bool use_truck_tare_weight = 7 [json_name = "use_truck_tare_weight"];
}

message ScaleNettoRequest {
  required uint64 scale_record_id = 1 [json_name = "scale_record_id"];
  required double weight_kg = 2 [json_name = "weight_kg"];
}

message ScaleResponse {
  required ScaleRecord scale_record = 1 [json_name = "scale_record"];
}

message ScaleRecordListRequest {
  optional uint64 owner_organization_id = 1 [json_name = "owner_organization_id"];
  optional uint64 service_provider_id = 2 [json_name = "service_provider_id"];
  optional WasteType waste_type = 3 [json_name = "waste_type"];
  optional uint64 driver_id = 4 [json_name = "driver_id"];
  optional uint64 truck_id = 5 [json_name = "truck_id"];
  optional google.protobuf.Timestamp brutto_scale_ts_from = 6 [json_name = "brutto_scale_ts_from"];
  optional google.protobuf.Timestamp brutto_scale_ts_to = 7 [json_name = "brutto_scale_ts_to"];
}

message ScaleRecordListResponse {
  repeated ScaleRecord scale_records = 1 [json_name = "scale_records"];
}

message RawScaleRecordListRequest {
  optional uint64 owner_organization_id = 1 [json_name = "owner_organization_id"];
  optional string sender = 2 [json_name = "sender"];
  optional string receiver = 3 [json_name = "receiver"];
  optional string waste_type = 4 [json_name = "waste_type"];
  optional string truck_number = 5 [json_name = "truck_number"];
  optional google.protobuf.Timestamp brutto_scale_ts_from = 6 [json_name = "brutto_scale_ts_from"];
  optional google.protobuf.Timestamp brutto_scale_ts_to = 7 [json_name = "brutto_scale_ts_to"];
}

message RawScaleRecordListResponse {
  repeated RawScaleRecord raw_scale_records = 1 [json_name = "raw_scale_records"];
}

service ScaleService {
  rpc ScaleBrutto(ScaleBruttoRequest) returns (ScaleResponse) {}
  rpc ScaleNetto(ScaleNettoRequest) returns (ScaleResponse) {}
  rpc ScaleRecordList(ScaleRecordListRequest) returns (ScaleRecordListResponse) {}
  rpc ScaleRecordById(IdRequest) returns (ScaleResponse) {}
  rpc RawScaleRecordList(RawScaleRecordListRequest) returns (RawScaleRecordListResponse) {}
}
