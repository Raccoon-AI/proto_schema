syntax = "proto2";
package raccoonai;

import "general.proto";
import "google/protobuf/struct.proto";
import "google/protobuf/timestamp.proto";
import "location.proto";
import "organization.proto";
import "organization_service.proto";
import "pickup_location.proto";
import "truck.proto";

option go_package = "./pb";

message GovGeoAccess {
  required uint64 id = 1 [json_name = "id"];
  required string area_name = 2 [json_name = "area_name"];
  required uint64 organization_id = 3 [json_name = "organization_id"];
  repeated Organization service_providers = 4 [json_name = "service_providers"];
  repeated PickupLocation pickup_locations = 5 [json_name = "pickup_locations"];
  repeated google.protobuf.Struct geometry = 6 [json_name = "geometry"];
  required google.protobuf.Timestamp created_at = 7 [json_name = "created_at"];
  required google.protobuf.Timestamp updated_at = 8 [json_name = "updated_at"];
}

message GovOrganizationRequest {
  repeated uint64 district_organization_ids = 1 [json_name = "district_organization_ids"];
  repeated uint64 service_provider_ids = 2 [json_name = "service_provider_ids"];
  repeated uint64 service_receiver_ids = 3 [json_name = "service_receiver_ids"];
}

message GovGeoAccessList {
  repeated GovGeoAccess gov_geo_accesses = 1 [json_name = "gov_geo_accesses"];
}

message ServiceProviderInfo {
  required uint64 id = 1 [json_name = "id"];
  required string name = 2 [json_name = "name"];
  required uint64 number_of_trucks = 3 [json_name = "number_of_trucks"];
}

message ServiceProviderInfoList {
  repeated ServiceProviderInfo organizations = 1 [json_name = "organizations"];
}

message PickupLocationInfo {
  required uint64 id = 1 [json_name = "id"];
  required string name = 2 [json_name = "name"];
  required uint64 lat = 3 [json_name = "lat"];
  required uint64 lon = 4 [json_name = "lon"];
}

service GovDashService {
  rpc GetGovGeoAccess(EmptyMessageRequest) returns (GovGeoAccessList) {}

  rpc ServiceProviders(GovOrganizationRequest) returns (OrganizationListResponse) {}
  rpc ServiceReceivers(GovOrganizationRequest) returns (OrganizationListResponse) {}
  rpc PickupLocations(GovOrganizationRequest) returns (PickupLocationList) {}
  rpc DisposalSites(EmptyMessageRequest) returns (OrganizationListResponse) {}
  rpc Trucks(GovOrganizationRequest) returns (TruckList) {}
  rpc Depots(GovOrganizationRequest) returns (LocationList) {}
}
