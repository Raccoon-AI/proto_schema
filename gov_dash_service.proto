syntax = "proto2";

package raccoonai;

import "container.proto";
import "contract.proto";
import "general.proto";
import "google/protobuf/timestamp.proto";
import "gov_geo_access.proto";
import "gps_tables.proto";
import "location.proto";
import "organization.proto";
import "pickup_location.proto";
import "truck.proto";

option go_package = "./pb";

message GovOrganizationRequest {
  repeated uint64 district_organization_ids = 1 [json_name = "district_organization_ids"];
  repeated uint64 service_provider_ids = 2 [json_name = "service_provider_ids"];
}

message GovServiceProviderInfo {
  required uint64 id = 1 [json_name = "id"];
  required string name = 2 [json_name = "name"];
  required string bin = 3 [json_name = "bin"];
  required uint64 number_of_trucks = 4 [json_name = "number_of_trucks"];
}

message GovServiceProviderInfoList {
  repeated GovServiceProviderInfo organizations = 1 [json_name = "organizations"];
}

message GovServiceProviderStats {
  required Organization organization = 1 [json_name = "organization"];
  required uint64 affiliated_receivers = 2 [json_name = "affiliated_receivers"];
  required uint64 affiliated_trucks = 3 [json_name = "affiliated_trucks"];
  required uint64 affiliated_pickup_locations = 4 [json_name = "affiliated_pickup_locations"];
  required uint64 affiliated_disposal_sites = 5 [json_name = "affiliated_disposal_sites"];
  required uint64 affiliated_depots = 6 [json_name = "affiliated_depots"];
}

message GovServiceReceiverStats {
  required Organization organization = 1 [json_name = "organization"];
  repeated Contract contracts = 2 [json_name = "contracts"];
  optional uint64 number_of_visits = 3 [json_name = "number_of_visits"];
}

message GovPickupLocationInfo {
  required uint64 id = 1 [json_name = "id"];
  required string name = 2 [json_name = "name"];
  required double lat = 3 [json_name = "lat"];
  required double lon = 4 [json_name = "lon"];
  optional uint64 service_provider_id = 5 [json_name = "service_provider_id"];
  optional string service_provider_name = 6 [json_name = "service_provider_name"];
}

message GovPickupLocationList {
  repeated GovPickupLocationInfo pickup_locations = 1 [json_name = "pickup_locations"];
}

message GovPickupLocationStats {
  required PickupLocation pickup_location = 1 [json_name = "pickup_location"];
  required Organization service_provider = 3 [json_name = "service_provider"];
  repeated ContainerGroup container_groups = 4 [json_name = "container_groups"];
}

message GovTruckInfo {
  required Truck truck = 1 [json_name = "truck"];
  required Organization service_provider = 2 [json_name = "service_provider"];
  optional double lat = 3 [json_name = "lat"];
  optional double lon = 4 [json_name = "lon"];
}

message GovTruckList {
  repeated GovTruckInfo trucks = 1 [json_name = "trucks"];
}

message GovTruckStats {
  required GovTruckInfo truck = 1 [json_name = "truck"];
  optional Location depot = 3 [json_name = "depot"];
  optional uint64 number_of_gps_stops = 4 [json_name = "number_of_gps_stops"];
  optional uint64 number_of_routes = 5 [json_name = "number_of_routes"];
  optional bool is_latest_route_active = 6 [json_name = "is_latest_route_active"];
}

message GovAnalyticsByIdRequest {
  required uint64 id = 1 [json_name = "id"];
  required DateTimeFilter from_to = 2 [json_name = "from_to"];
}

message GovDepotInfo {
  required Location depot = 1 [json_name = "depot"];
  required Organization owner_organization = 2 [json_name = "owner_organization"];
  required uint64 number_of_trucks = 3 [json_name = "number_of_trucks"];
}

message GovDepotInfoList {
  repeated GovDepotInfo depots = 1 [json_name = "depots"];
}

message GovServiceProviderAnalyticsRequest {
  required uint64 service_provider_id = 1 [json_name = "service_provider_id"];
  required DateTimeFilter from_to = 2 [json_name = "from_to"];
}

message GovServiceProviderAnalyticsResponse {
  required uint64 service_provider_id = 1 [json_name = "service_provider_id"];
  required uint64 total_location_stops = 2 [json_name = "total_location_stops"];
  required uint64 total_locations = 3 [json_name = "total_locations"];
  required uint64 trucks_active = 4 [json_name = "trucks_active"];
  required uint64 total_trucks = 5 [json_name = "total_trucks"];
}

message GovServiceReceiverAnalyticsRequest {
  required uint64 service_receiver_id = 1 [json_name = "service_receiver_id"];
  required DateTimeFilter from_to = 2 [json_name = "from_to"];
  optional uint64 container_group_id = 3 [json_name = "container_group_id"];
}

message GovServiceReceiverAnalyticsResponse {
  required uint64 service_receiver_id = 1 [json_name = "service_receiver_id"];
  required uint64 total_location_stops = 2 [json_name = "total_location_stops"];
  repeated GpsStop gps_stops = 3 [json_name = "gps_stops"];
}

message GovPickupLocationAnalyticsRequest {
  required uint64 pickup_location_id = 1 [json_name = "pickup_location_id"];
  required DateTimeFilter from_to = 2 [json_name = "from_to"];
}

message GovPickupLocationAnalyticsResponse {
  required uint64 pickup_location_id = 1 [json_name = "pickup_location_id"];
  required uint64 total_location_stops = 2 [json_name = "total_location_stops"];
  repeated GpsStop gps_stops = 3 [json_name = "gps_stops"];
}

message GovTruckAnalyticsRequest {
  required uint64 truck_id = 1 [json_name = "truck_id"];
  required DateTimeFilter from_to = 2 [json_name = "from_to"];
}

message GovTruckAnalyticsResponse {
  required uint64 truck_id = 1 [json_name = "truck_id"];
  required uint64 total_location_stops = 2 [json_name = "total_location_stops"];
  required uint64 disposal_stops = 3 [json_name = "disposal_stops"];
  repeated GpsStop gps_stops = 4 [json_name = "gps_stops"];
  optional uint64 anomalies = 5 [json_name = "anomalies"];
}

message GovDepotAnalyticsRequest {
  required uint64 depot_id = 1 [json_name = "depot_id"];
  required DateTimeFilter from_to = 2 [json_name = "from_to"];
}

message GovTruckActiveResponse {
  required Truck truck = 1 [json_name = "truck"];
  optional google.protobuf.Timestamp last_active = 2 [json_name = "last_active"];
}

message GovDepotAnalyticsResponse {
  required uint64 depot_id = 1 [json_name = "depot_id"];
  required uint64 total_trucks = 2 [json_name = "total_trucks"];
  required uint64 trucks_active = 3 [json_name = "trucks_active"];
  repeated GovTruckActiveResponse truck_actities = 4 [json_name = "trucks"];
}

message GovSuspiciousLocationAnalyticsRequest {
  required uint64 suspicious_location_id = 1 [json_name = "suspicious_location_id"];
  required DateTimeFilter from_to = 2 [json_name = "from_to"];
}

message GovSuspiciousLocationAnalyticsResponse {
  required uint64 suspicious_location_id = 1 [json_name = "suspicious_location_id"];
  required uint64 total_location_stops = 2 [json_name = "total_location_stops"];
  repeated GpsStop gps_stops = 3 [json_name = "gps_stops"];
  optional uint64 anomalies = 4 [json_name = "anomalies"];
}

message GovDashboardAnalyticsRequest {
  required GovOrganizationRequest filter = 1 [json_name = "filter"];
  required DateTimeFilter from_to = 2 [json_name = "from_to"];
}

message GovDashboardAnalyticsResponse {
  required uint64 total_location_stops = 1 [json_name = "total_location_stops"];
  required uint64 total_locations = 2 [json_name = "total_locations"];
  required uint64 unique_location_stops = 3 [json_name = "unique_location_stops"];
  required uint64 trucks_active = 4 [json_name = "trucks_active"];
  required uint64 total_trucks = 5 [json_name = "total_trucks"];
  required uint64 total_anomalies = 6 [json_name = "total_anomalies"];
  required uint64 service_providers_with_anomalies = 7 [json_name = "service_providers_with_anomalies"];
}

message SuspiciousLocation {
  required Location location = 1 [json_name = "location"];
  required uint64 total_stops = 2 [json_name = "total_stops"];
}

message SuspiciousLocationResponse {
  repeated SuspiciousLocation locations = 1 [json_name = "locations"];
}

message AnomalieRouteResponse {
  required Truck truck = 1 [json_name = "truck"];
  required Organization owner_organization = 2 [json_name = "owner_organization"];
  repeated GpsStop gps_stops = 3 [json_name = "gps_stops"];
}

message GovRawScaleAnalyticsRequest {
  required DateTimeFilter from_to = 1 [json_name = "from_to"];
  optional uint64 owner_organization_id = 2 [json_name = "owner_organization_id"];
}

message GovRawScaleAnalyticsResponse {
  required double total_netto_kg = 1 [json_name = "total_netto_kg"];
  required uint64 total_records = 2 [json_name = "total_records"];
  map<string, double> weights_by_waste_type = 3 [json_name = "weights_by_waste_type"];
}

service GovDashService {
  rpc GetGovGeoAccess(EmptyMessageRequest) returns (GovGeoAccessList) {}
  rpc ServiceProviders(GovOrganizationRequest) returns (GovServiceProviderInfoList) {}
  rpc ServiceReceivers(GovOrganizationRequest) returns (OrganizationList) {}
  rpc PickupLocations(GovOrganizationRequest) returns (GovPickupLocationList) {}
  rpc DisposalSites(EmptyMessageRequest) returns (OrganizationList) {}
  rpc Trucks(GovOrganizationRequest) returns (GovTruckList) {}
  rpc Depots(GovOrganizationRequest) returns (GovDepotInfoList) {}

  rpc GetServiceProviderStatsById(IdRequest) returns (GovServiceProviderStats) {}
  rpc GetServiceReceiverStatsById(IdRequest) returns (GovServiceReceiverStats) {}
  rpc GetDisposalSiteById(IdRequest) returns (Organization) {}
  rpc GetPickupLocationStatsById(IdRequest) returns (GovPickupLocationStats) {}
  rpc GetTruckStatsById(IdRequest) returns (GovTruckStats) {}
  rpc GetDepotById(IdRequest) returns (GovDepotInfo) {}

  rpc GetGovDashboardAnalytics(GovDashboardAnalyticsRequest) returns (GovDashboardAnalyticsResponse) {}
  rpc GetGovServiceProviderAnalytics(GovServiceProviderAnalyticsRequest) returns (GovServiceProviderAnalyticsResponse) {}
  rpc GetGovServiceReceiverAnalytics(GovServiceReceiverAnalyticsRequest) returns (GovServiceReceiverAnalyticsResponse) {}
  rpc GetGovPickupLocationAnalytics(GovPickupLocationAnalyticsRequest) returns (GovPickupLocationAnalyticsResponse) {}
  rpc GetGovTruckAnalytics(GovTruckAnalyticsRequest) returns (GovTruckAnalyticsResponse) {}
  rpc GetGovDepotAnalytics(GovDepotAnalyticsRequest) returns (GovDepotAnalyticsResponse) {}
  rpc GetGovSuspiciousLocationAnalytics(GovSuspiciousLocationAnalyticsRequest) returns (GovSuspiciousLocationAnalyticsResponse) {}
  rpc GetGovRawScaleAnalytics(GovRawScaleAnalyticsRequest) returns (GovRawScaleAnalyticsResponse) {}

  rpc SuspiciousLocations(EmptyMessageRequest) returns (SuspiciousLocationResponse) {}
  rpc CreateSuspiciousLocation(LocationCreate) returns (Location) {}
  rpc UpdateSuspiciousLocation(LocationUpdate) returns (Location) {}
  rpc AnomaliesList(GovDashboardAnalyticsRequest) returns (GpsStopList) {}
  rpc AnomalieRoute(IdRequest) returns (AnomalieRouteResponse) {}
}
