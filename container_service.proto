syntax = "proto2";
package raccoonai;

import "container.proto";
import "general.proto";

option go_package = "./pb";

message ContainerTypeRequest {
  required uint64 id = 1 [json_name = "id"];
  required uint64 owner_organization_id = 2 [json_name = "owner_organization_id"];
}

message ContainerTypeListRequest {
  repeated uint64 owner_organization_ids = 1 [json_name = "owner_organization_ids"];
  optional ListFilter list_filter = 2 [json_name = "list_filter"];
}

message ContainerGroupRequest {
  required uint64 id = 1 [json_name = "id"];
  required uint64 owner_organization_id = 2 [json_name = "owner_organization_id"];
}

message ContainerGroupListRequest {
  repeated uint64 owner_organization_ids = 1 [json_name = "owner_organization_ids"];
  repeated uint64 container_type_ids = 2 [json_name = "container_type_ids"];
  repeated uint64 pickup_location_ids = 3 [json_name = "pickup_location_ids"];
  optional ListFilter list_filter = 4 [json_name = "list_filter"];
}

message CompatibleContainerGroupsRequest {
  required uint64 owner_organization_id = 1 [json_name = "owner_organization_id"];
  required uint64 truck_id = 2 [json_name = "truck_id"];
}

message ContainerRequest {
  required uint64 id = 1 [json_name = "id"];
  required uint64 owner_organization_id = 2 [json_name = "owner_organization_id"];
}

message ContainerListRequest {
  repeated uint64 owner_organization_ids = 1 [json_name = "owner_organization_ids"];
  repeated uint64 container_type_ids = 2 [json_name = "container_type_ids"];
  repeated uint64 pickup_location_ids = 3 [json_name = "pickup_location_ids"];
  repeated uint64 container_group_ids = 4 [json_name = "container_group_ids"];
  repeated ContainerStatus statuses = 5 [json_name = "statuses"];
  optional ListFilter list_filter = 6 [json_name = "list_filter"];
}

service ContainerService {
  // Container Type operations
  rpc CreateContainerType(ContainerTypeCreate) returns (ContainerType) {}
  rpc GetContainerTypeById(ContainerTypeRequest) returns (ContainerType) {}
  rpc UpdateContainerType(ContainerTypeUpdate) returns (ContainerType) {}
  rpc ListContainerTypes(ContainerTypeListRequest) returns (ContainerTypeList) {}

  // Container Group operations
  rpc CreateContainerGroup(ContainerGroupCreate) returns (ContainerGroup) {}
  rpc GetContainerGroupById(ContainerGroupRequest) returns (ContainerGroup) {}
  rpc UpdateContainerGroup(ContainerGroupUpdate) returns (ContainerGroup) {}
  rpc ListContainerGroups(ContainerGroupListRequest) returns (ContainerGroupList) {}
  rpc DeleteContainerGroup(ContainerGroupRequest) returns (MessageResponse) {}
  rpc ListCompatibleContainerGroupsForTruck(CompatibleContainerGroupsRequest) returns (ContainerGroupList) {}

  // Container operations
  rpc CreateContainer(ContainerCreate) returns (Container) {}
  rpc GetContainerById(ContainerRequest) returns (Container) {}
  rpc UpdateContainer(ContainerUpdate) returns (Container) {}
  rpc ListContainers(ContainerListRequest) returns (ContainerList) {}
  rpc DeleteContainer(ContainerRequest) returns (MessageResponse) {}
  rpc UpdateContainerLocation(ContainerStatusUpdate) returns (MessageResponse) {}
}
