syntax = "proto2";
package raccoonai;

import "google/protobuf/timestamp.proto";

option go_package = "./pb";

message DateTimeFilter {
  required google.protobuf.Timestamp from = 1 [json_name = "from"];
  required google.protobuf.Timestamp to = 2 [json_name = "to"];
}

message DateFilter {
  // Inclusive start date in RFC 3339 full-date format: YYYY-MM-DD.
  // This field is date-only and must not include a time or timezone.
  required string from = 1 [json_name = "from"];
  // Inclusive end date in RFC 3339 full-date format: YYYY-MM-DD.
  // This field is date-only and must not include a time or timezone.
  required string to = 2 [json_name = "to"];
}

enum ErrorCode {
  ERROR_CODE_UNDEFINED = 0;

  // Authentication
  ERROR_CODE_AUTH_HEADER_ISSUE = 101;
  ERROR_CODE_AUTH_TOKEN_ISSUE = 102;
  ERROR_CODE_AUTH_TOKEN_INVALID = 103;
  ERROR_CODE_AUTH_MISSING_CTX = 104;
  ERROR_CODE_INVALID_CREDENTIALS = 105;
  ERROR_CODE_AUTH_EXPIRED = 106;
  ERROR_CODE_AUTH_INVALID_USER_DATA = 107;
  ERROR_CODE_NO_PHONE_OR_EMAIL_PROVIDED = 108;
  ERROR_CODE_OTP_SERVICE_ISSUE = 109;
  ERROR_CODE_OTP_INVALID = 110;
  ERROR_CODE_OTP_EXPIRED = 111;
  ERROR_CODE_OTP_RATE_LIMIT = 112;
  ERROR_CODE_PASSWORD_RESET_ISSUE = 113;
  ERROR_CODE_OTP_EMAIL_REQUIRED = 114;
  ERROR_CODE_OTP_PHONE_REQUIRED = 115;
  ERROR_CODE_USER_INACTIVE = 116;

  // Permission/Authorization errors
  ERROR_CODE_PERMISSION_DENIED = 201;
  ERROR_CODE_NO_ACCESS = 202;
  ERROR_CODE_INVALID_PERMISSION_REQUEST = 203;
  ERROR_CODE_OWNER_ORGANIZATION_LIST_REQUIRED = 204;
  ERROR_CODE_SERVICE_PROVIDER_LIST_REQUIRED = 205;
  ERROR_CODE_SERVICE_RECEIVER_LIST_REQUIRED = 206;
  ERROR_CODE_TARGET_ORGANIZATION_LIST_REQUIRED = 207;
  ERROR_CODE_GRANT_OPERATION_FAILED = 211;
  ERROR_CODE_MEMBERSHIP_OPERATION_FAILED = 212;
  ERROR_CODE_ADMIN_ACTION_REQUIRED = 213;
  ERROR_CODE_UNDEFINED_ROLE = 220;

  // Validation errors
  ERROR_CODE_REQUIRED_FIELD_MISSING = 301;
  ERROR_CODE_INVALID_FIELD_VALUE = 302;
  ERROR_CODE_DUPLICATE_ENTRY = 303;
  ERROR_CODE_INVALID_FORMAT = 304;
  ERROR_CODE_VALUE_TOO_SHORT = 305;
  ERROR_CODE_VALUE_TOO_LONG = 306;
  ERROR_CODE_OUT_OF_RANGE = 307;
  ERROR_CODE_FILE_REQUIRED = 308;
  ERROR_CODE_FILTER_REQUIRED = 309;
  ERROR_CODE_FILTER_INVALID = 310;
  ERROR_CODE_INVALID_ENUM_VALUE = 311;
  ERROR_CODE_INVALID_REQUEST_STATE = 312;
  ERROR_CODE_ORGANIZATION_TYPE_MISMATCH = 313;
  ERROR_CODE_INVALID_VALUE = 314;

  // File / storage errors
  ERROR_CODE_FILE_INVALID_BASE64 = 320;
  ERROR_CODE_FILE_UPLOAD_FAILED = 321;
  ERROR_CODE_FILE_TYPE_INVALID = 322;

  // Look-up errors
  ERROR_CODE_NOT_FOUND = 401;
  ERROR_CODE_MULTIPLE_FOUND = 402;
  ERROR_CODE_INVALID_ID = 403;
  ERROR_CODE_INVALID_QUERY = 404;
  ERROR_CODE_RELATED_ENTITY_NOT_FOUND = 405;
  ERROR_CODE_ORGANIZATION_NOT_FOUND = 406;
  ERROR_CODE_CONTAINER_TYPE_NOT_FOUND = 407;

  // Creation errors
  ERROR_CODE_CREATION_NOT_ALLOWED = 501;
  ERROR_CODE_CREATE_ISSUE = 502;
  ERROR_CODE_DUPLICATE_PHONE_NUMBER = 503;
  ERROR_CODE_DUPLICATE_EMAIL = 504;
  ERROR_CODE_ALREADY_EXISTS = 505;

  // Update errors
  ERROR_CODE_UPDATE_NOT_ALLOWED = 601;
  ERROR_CODE_UPDATE_FAILED = 602;
  ERROR_CODE_UPDATE_INVALID = 603;

  // Deletion errors
  ERROR_CODE_DELETION_NOT_ALLOWED = 701;
  ERROR_CODE_DELETION_FAILED = 702;
  ERROR_CODE_DELETION_INVALID = 703;

  // Internal server errors
  ERROR_CODE_GORM_TO_PROTO_CONVERSION = 801;
  ERROR_CODE_DATA_MARSHALING_FAILED = 802;

  // External service errors
  ERROR_CODE_PERMIFY_ISSUE = 901;
  ERROR_CODE_STORAGE_SERVICE_ISSUE = 902; // Unexpected error from file storage service (e.g., S3)
  ERROR_CODE_WHATSAPP_SENDING_ISSUE = 903;
  ERROR_CODE_EMAIL_SENDING_ISSUE = 904;
  ERROR_CODE_DATABASE_ISSUE = 905;
  ERROR_CODE_NOSQL_DATABASE_ISSUE = 906;
  ERROR_CODE_VRP_SERVICE_ISSUE = 907;
  ERROR_CODE_COST_PROVIDER_ISSUE = 908;
}

enum ResponseStatus {
  RESPONSE_STATUS_UNDEFINED = 0;
  RESPONSE_STATUS_OK = 1;
  RESPONSE_STATUS_NOT_FOUND = 2;
  RESPONSE_STATUS_SERVER_ERROR = 3;
}

message ErrorMessage {
  optional ErrorCode code = 1 [json_name = "code"]; // To show clients what exactly went wrong, useful for client-side handling
  repeated string messages = 2 [json_name = "messages"]; // For developers
}

message MessageResponse {
  required ResponseStatus status = 1 [json_name = "status"];
  optional string message = 2 [json_name = "message"];
  optional ErrorMessage error = 3 [json_name = "error"];
}

message EmptyMessageRequest {}

message EmptyMessageResponse {}

message IdRequest {
  required uint64 id = 1 [json_name = "id"];
}

enum SortDirection {
  SORT_DIRECTION_UNDEFINED = 0;
  SORT_DIRECTION_ASCENDING = 1;
  SORT_DIRECTION_DESCENDING = 2;
}

message ListFilter {
  optional uint32 current_page = 1 [
    json_name = "current_page",
    default = 0
  ]; // starting from 0 (OFFSET)
  optional uint32 page_size = 2 [
    json_name = "page_size",
    default = 50
  ]; // max 100 (LIMIT)
  optional string sort_by = 3 [
    json_name = "sort_by",
    default = "id"
  ]; // field name to sort by, default is "id"
  optional SortDirection sort_direction = 4 [
    json_name = "sort_direction",
    default = SORT_DIRECTION_DESCENDING
  ];
}

message ListInfo {
  required uint32 total_items = 1 [json_name = "total_items"];
  required uint32 current_page = 2 [json_name = "current_page"]; // <-- ListFilter.current_page
  required uint32 page_size = 3 [json_name = "page_size"]; // <-- ListFilter.page_size
  optional string sort_by = 4 [
    json_name = "sort_by",
    default = "id"
  ];
  optional SortDirection sort_direction = 5 [
    json_name = "sort_direction",
    default = SORT_DIRECTION_DESCENDING
  ];
}
