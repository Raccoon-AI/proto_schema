syntax = "proto2";
package raccoonai;

import "enums.proto";
import "general.proto";
import "google/protobuf/timestamp.proto";
import "organization.proto";

option go_package = "./pb";

message User {
  required uint64 id = 1 [json_name = "id"];
  required UserRole role = 2 [json_name = "role"];
  optional uint64 owner_organization_id = 3 [json_name = "owner_organization_id"];
  optional string first_name = 4 [json_name = "first_name"];
  optional string last_name = 5 [json_name = "last_name"];
  optional string phone_number = 6 [json_name = "phone_number"];
  optional string email = 7 [json_name = "email"];
  required UserStatus status = 8 [json_name = "status"];
  optional string driver_license_number = 9 [json_name = "driver_license_number"];
  optional string fcm_token = 10 [json_name = "fcm_token"];
  optional Organization owner_organization = 11 [json_name = "owner_organization"];
  required google.protobuf.Timestamp created_at = 101 [json_name = "created_at"];
  optional google.protobuf.Timestamp updated_at = 102 [json_name = "updated_at"];
}

message UserCreate {
  required UserRole role = 1 [json_name = "role"];
  optional uint64 owner_organization_id = 2 [json_name = "owner_organization_id"]; // to be required
  optional string first_name = 3 [json_name = "first_name"];
  optional string last_name = 4 [json_name = "last_name"];
  optional string phone_number = 5 [json_name = "phone_number"];
  optional string email = 6 [json_name = "email"];
  required string password = 7 [json_name = "password"];
  optional string driver_license_number = 8 [json_name = "driver_license_number"];
  optional string fcm_token = 9 [json_name = "fcm_token"];
  optional string registration_token = 10 [json_name = "registration_token"];
}

message UserUpdate {
  required uint64 id = 1 [json_name = "id"];
  optional uint64 owner_organization_id = 2 [json_name = "owner_organization_id"]; // to be required
  optional string first_name = 3 [json_name = "first_name"];
  optional string last_name = 4 [json_name = "last_name"];
  optional string phone_number = 5 [json_name = "phone_number"];
  optional string email = 6 [json_name = "email"];
  optional UserStatus status = 7 [json_name = "status"];
  optional string driver_license_number = 8 [json_name = "driver_license_number"];
  optional string fcm_token = 9 [json_name = "fcm_token"];
  optional UserRole role = 10 [json_name = "role"];
}

message UserUpdateRole {
  required uint64 id = 1 [json_name = "id"];
  required UserRole role = 2 [json_name = "role"];
}

message RegistrationTokenCreate {
  required string token = 1 [json_name = "token"];
  required uint64 owner_organization_id = 2 [json_name = "owner_organization_id"];
  required UserRole role = 3 [json_name = "role"];
  required google.protobuf.Timestamp expires_at = 4 [json_name = "expires_at"];
  required uint64 created_by_user_id = 5 [json_name = "created_by_user_id"];
  optional bool is_used = 6 [json_name = "is_used"];
}

message RegistrationTokenUpdate {
  required uint64 id = 1 [json_name = "id"];
  required bool is_used = 2 [json_name = "is_used"];
}

message GenerateLink {
  required UserRole role = 1 [json_name = "role"];
  required int32 owner_organization_id = 2 [json_name = "owner_organization_id"];
  required string preferred_method = 3 [json_name = "preferred_method"];
  required string recipient = 4 [json_name = "recipient"];
  required string lang = 5 [json_name = "lang"];
}

message PasswordUpdate {
  required uint64 id = 1 [json_name = "id"];
  required string old_pwd = 2 [json_name = "old_pwd"];
  required string new_pwd = 3 [json_name = "new_pwd"];
}

message UserListRequest {
  repeated UserRole roles = 1 [json_name = "roles"];
  repeated UserStatus statuses = 2 [json_name = "statuses"];
  repeated uint64 owner_organization_ids = 3 [json_name = "owner_organization_ids"];
  optional ListFilter list_filter = 10 [json_name = "list_filter"];
}

message UserList {
  repeated User users = 1 [json_name = "users"];
  optional ListInfo list_info = 2 [json_name = "list_info"];
}

enum PreferredMethod {
  PREFERRED_METHOD_UNDEFINED = 0;
  PREFERRED_METHOD_WHATSAPP = 1;
  PREFERRED_METHOD_EMAIL = 2;
  PREFERRED_METHOD_COPY = 3;
}

message InviteUserRequest {
  required UserRole role = 1 [json_name = "role"];
  required int32 owner_organization_id = 2 [json_name = "owner_organization_id"];
  required PreferredMethod preferred_method = 3 [json_name = "preferred_method"];
  required string recipient = 4 [json_name = "recipient"];
  required string lang = 5 [json_name = "lang"];
}

message InviteUserResponse {
  required ResponseStatus status = 1 [json_name = "status"];
  required string registration_token = 2 [json_name = "registration_token"];
}
