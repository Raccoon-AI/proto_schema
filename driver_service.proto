syntax = "proto2";
package raccoonai;

import "container.proto";
import "driver_on_shift.proto";
import "file_upload.proto";
import "general.proto";
import "google/protobuf/timestamp.proto";
import "job.proto";
import "location.proto";
import "route.proto";

option go_package = "./pb";

message JobFileUploadRequest {
  required File file = 1 [json_name = "file"];
  required FileUploadType type = 2 [json_name = "type"];
  optional uint64 job_id = 3 [json_name = "job_id"];
}

message MyLocationRequest {
  required double lat = 1 [json_name = "lat"];
  required double lon = 2 [json_name = "lon"];
  optional double accuracy = 3 [json_name = "accuracy"];
  optional double altitude = 4 [json_name = "altitude"];
  optional double heading = 5 [json_name = "heading"];
  optional double speed = 6 [json_name = "speed"];
  optional uint64 current_route_id = 7 [json_name = "route_id"];
  optional uint64 current_job_id = 8 [json_name = "job_id"];
  required google.protobuf.Timestamp sent_at = 9 [json_name = "sent_at"];
}

message FirebaseNotificationsRequest {
  required bool subscribe = 1 [json_name = "subscribe"];
  optional string fcm_token = 2 [json_name = "fcm_token"];
}

// TODO: define response message properly
// Does it need to return topic/token info?
message FirebaseNotificationsResponse {
  required bool success = 1 [json_name = "success"];
  optional string message = 2 [json_name = "message"];
}

service DriverService {
  rpc MyShift(EmptyMessageRequest) returns (DriverOnShift) {}
  rpc SendMyLocation(MyLocationRequest) returns (MessageResponse) {}

  // ******** Old Event Calls *********** //
  // event calls
  rpc SendDriverOnShiftEvent(DriverOnShiftEventIn) returns (DriverOnShift) {} // To deprecate
  rpc SendJobEvent(JobEventIn) returns (Job) {} // To deprecate
  rpc SendRouteEvent(RouteEventIn) returns (Route) {} // To deprecate

  // ******** New Event Calls *********** //

  // Choose route from the list of assigned routes
  // Changes route status to IN_PROGRESS
  rpc ChooseRoute(IdRequest) returns (Route) {}

  // Choose pickup location from the list of jobs in the assigned route.
  // If the route has several jobs at the same pickup location, all those
  // jobs will be ENROUTE and returned.
  rpc ChoosePickupLocation(IdRequest) returns (JobList) {}

  // Get current assigned route and it's jobs. Can be used by driver app to
  // refresh the screen after app restart or network failure.
  rpc GetCurrentRoute(EmptyMessageRequest) returns (Route) {}

  // When arrived to pickup location and start performing service
  // (e.g., start cleaning container, or start disinfection).
  // Changes job status to ON_SERVICE
  rpc StartServiceCurrentJob(IdRequest) returns (Job) {}

  // When finished performing service at pickup location and ready to leave.
  // Changes job status to COMPLETED, and if it's the last job in the route,
  // changes route status to RETURNING
  rpc CompleteCurrentJob(EmptyMessageRequest) returns (Job) {}

  // When driver is en-route back to the depot. Changes route status to RETURNING.
  // Any unfinished jobs in the route will be marked as NOT_COMPLETED and
  // recreated with same order number.
  rpc ReturnToDepot(EmptyMessageRequest) returns (Route) {}

  // When driver has arrived at the depot and completes the route. Changes route
  // status to COMPLETED
  rpc CompleteCurrentRoute(EmptyMessageRequest) returns (Route) {}

  // Upload job-related file (e.g., photo evidence)
  rpc UploadJobFile(JobFileUploadRequest) returns (MessageResponse) {}

  // ******** Route Related RPCs *********** //
  rpc AssignedRoutes(EmptyMessageRequest) returns (RouteList) {}
  // history of routes assigned to driver
  rpc GetRouteHistory(DateTimeFilter) returns (RouteList) {}
  // update container's location
  rpc UpdateContainerLocation(ContainerStatusUpdate) returns (MessageResponse) {}

  // ******** Firebase Related RPCs *********** //
  // Subscribe or Unsubscribe
  rpc FirebaseNotifications(FirebaseNotificationsRequest) returns (FirebaseNotificationsResponse) {}

  // TODO: add endpoints related to pins(depots, pickups) on the map

  rpc GetLocations(LocationListRequest) returns (LocationList) {}
}
