syntax = "proto2";
package raccoonai;

import "container.proto";
import "enums.proto";
import "general.proto";
import "google/protobuf/struct.proto";
import "google/protobuf/timestamp.proto";

option go_package = "./pb";

message PickupLocation {
  required uint64 id = 1 [json_name = "id"];
  required string name = 3 [json_name = "name"];
  required PickupLocationType type = 4 [json_name = "type"];
  optional uint64 owner_organization_id = 5 [json_name = "owner_organization_id"]; // will be deprecated
  optional uint64 service_provider_id = 6 [json_name = "service_provider_id"]; // will be required
  required LocationStatus status = 7 [json_name = "status"];
  required double lon = 8 [json_name = "lon"];
  required double lat = 9 [json_name = "lat"];
  optional google.protobuf.Struct geometry = 10 [json_name = "geometry"];
  optional string address = 11 [json_name = "address"];
  optional string availability_schedule = 12 [json_name = "availability_schedule"];
  optional string notification_schedule = 13 [json_name = "notification_schedule"];
  optional uint64 num_containers = 14 [json_name = "num_containers"];
  optional PickupLocationPriority priority = 15 [json_name = "priority"];
  optional string geo_group = 16 [json_name = "geo_group"];
  optional uint64 tariff = 17 [json_name = "tariff"];
  optional uint64 receiver_user_id = 18 [json_name = "receiver_user_id"];
  optional uint64 contract_id = 19 [json_name = "contract_id"];
  optional string comment = 20 [json_name = "comment"];
  optional string gis_link = 21 [json_name = "gis_link"];
  optional uint64 service_time = 22 [json_name = "service_time"];
  optional uint64 primary_contact_id = 23 [json_name = "primary_contact_id"]; // ID of primary contact
  optional string plan_waste_volume = 24 [json_name = "plan_waste_volume"];
  optional string plan_waste_mass = 25 [json_name = "plan_waste_mass"];
  repeated ContainerGroup container_groups = 26 [json_name = "container_groups"];
  required google.protobuf.Timestamp created_at = 101 [json_name = "created_at"];
}

message PickupLocationCreate {
  optional uint64 owner_organization_id = 1 [json_name = "owner_organization_id"]; // to be deprecated
  optional uint64 service_provider_id = 2 [json_name = "service_provider_id"]; // to be required
  required string name = 3 [json_name = "name"];
  required PickupLocationType type = 4 [json_name = "type"];
  required double lon = 5 [json_name = "lon"];
  required double lat = 6 [json_name = "lat"];
  optional google.protobuf.Struct geometry = 7 [json_name = "geometry"];
  optional string address = 8 [json_name = "address"];
  optional string availability_schedule = 9 [json_name = "availability_schedule"];
  optional string notification_schedule = 10 [json_name = "notification_schedule"];
  optional uint64 num_containers = 11 [json_name = "num_containers"]; // To be deprecated in favor of container_groups
  optional PickupLocationPriority priority = 12 [json_name = "priority"]; // To be deprecated
  optional string geo_group = 13 [json_name = "geo_group"]; // To be deprecated
  optional uint64 tariff = 14 [json_name = "tariff"]; // To be deprecated
  optional uint64 receiver_user_id = 15 [json_name = "receiver_user_id"]; // To be deprecated
  optional uint64 contract_id = 16 [json_name = "contract_id"];
  optional string comment = 17 [json_name = "comment"];
  optional string gis_link = 18 [json_name = "gis_link"];
  optional uint64 service_time = 19 [json_name = "service_time"]; // To be deprecated
  optional string plan_waste_volume = 20 [json_name = "plan_waste_volume"]; // To be deprecated
  optional string plan_waste_mass = 21 [json_name = "plan_waste_mass"]; // To be deprecated
}

message PickupLocationUpdate {
  required uint64 id = 1 [json_name = "id"];
  optional uint64 owner_organization_id = 2 [json_name = "owner_organization_id"]; // to be deprecated
  optional uint64 service_provider_id = 3 [json_name = "service_provider_id"]; // to be required
  optional string name = 4 [json_name = "name"];
  optional PickupLocationType type = 5 [json_name = "type"];
  optional LocationStatus status = 6 [json_name = "status"];
  optional double lon = 7 [json_name = "lon"];
  optional double lat = 8 [json_name = "lat"];
  optional google.protobuf.Struct geometry = 9 [json_name = "geometry"];
  optional string address = 10 [json_name = "address"];
  optional string availability_schedule = 11 [json_name = "availability_schedule"];
  optional string notification_schedule = 12 [json_name = "notification_schedule"];
  optional uint64 num_containers = 13 [json_name = "num_containers"];
  optional PickupLocationPriority priority = 14 [json_name = "priority"];
  optional string geo_group = 15 [json_name = "geo_group"];
  optional uint64 tariff = 16 [json_name = "tariff"];
  optional uint64 receiver_user_id = 17 [json_name = "receiver_user_id"];
  optional uint64 contract_id = 18 [json_name = "contract_id"];
  optional string comment = 19 [json_name = "comment"];
  optional string gis_link = 20 [json_name = "gis_link"];
  optional uint64 service_time = 21 [json_name = "service_time"];
  optional uint64 primary_contact_id = 22 [json_name = "primary_contact_id"];
  optional string plan_waste_volume = 23 [json_name = "plan_waste_volume"];
  optional string plan_waste_mass = 24 [json_name = "plan_waste_mass"];
}

message PickupLocationListContract {
  repeated uint64 pickup_location_ids = 1 [json_name = "pickup_location_ids"];
  required uint64 contract_id = 2 [json_name = "contract_id"];
}

message PickupLocationList {
  repeated PickupLocation pickup_locations = 1 [json_name = "pickup_locations"];
  optional ListInfo list_info = 2 [json_name = "list_info"];
}

message PickupLocationGroup {
  required uint64 id = 1 [json_name = "id"];
  required string name = 2 [json_name = "name"];
  repeated ContainerGroup container_groups = 3 [json_name = "container_groups"];
  required uint64 owner_organization_id = 4 [json_name = "owner_organization_id"];
  optional uint64 truck_id = 5 [json_name = "truck_id"];
}

message PickupLocationGroupCreate {
  required string group_name = 1 [json_name = "name"];
  optional uint64 owner_organization_id = 4 [json_name = "owner_organization_id"];
  optional uint64 truck_id = 5 [json_name = "truck_id"];
}

message PickupLocationGroupList {
  repeated PickupLocationGroup pickup_location_groups = 1 [json_name = "pickup_location_groups"];
  optional ListInfo list_info = 2 [json_name = "list_info"];
}

message PickupLocationGroupUpdate {
  required uint64 id = 1 [json_name = "id"];
  optional string group_name = 2 [json_name = "name"];
  optional uint64 owner_organization_id = 4 [json_name = "owner_organization_id"];
  optional uint64 truck_id = 5 [json_name = "truck_id"];
}
