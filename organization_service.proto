syntax = "proto2";

package raccoonai;

import "enums.proto";
import "general.proto";
import "organization.proto";
import "organization_settings.proto";

option go_package = "./pb";

message AddGuestRequest {
  required string org_name = 1 [json_name = "org_name"];
  required string bin = 2 [json_name = "bin"];
  required string driver_first_name = 3 [json_name = "driver_first_name"];
  required string driver_last_name = 4 [json_name = "driver_last_name"];
  required string driver_phone_number = 5 [json_name = "driver_phone_number"];
  optional string driver_license_number = 6 [json_name = "driver_license_number"];
  required string truck_plate_number = 7 [json_name = "truck_plate_number"];
  required TruckType truck_type = 8 [json_name = "truck_type"];
}

message AddGuestResponse {
  required uint64 organization_id = 1 [json_name = "organization_id"];
  required uint64 driver_id = 2 [json_name = "driver_id"];
  required uint64 truck_id = 3 [json_name = "truck_id"];
}

message CreateGuestOrganizationRequest {
  required string org_name = 1 [json_name = "org_name"];
  required string bin = 2 [json_name = "bin"];
}

message CreateGuestOrganizationResponse {
  required uint64 organization_id = 1 [json_name = "organization_id"];
}

message OrganizationRequest {
  required uint64 organization_id = 1 [json_name = "organization_id"];
}

message ChildrenOrganizationListRequest {
  optional uint64 parent_organization_id = 1 [json_name = "parent_organization_id"]; // To be required
  optional Pagination pagination = 10 [json_name = "pagination"];
}

message ServiceReceiverCreateRequest {
  required OrganizationCreate organization = 1 [json_name = "organization"];
  required uint64 service_provider_id = 2 [json_name = "service_provider_id"];
}

service OrganizationService {
  // requests releted to guest orgs and users, which will be used by waste disposals
  // to register in their system one-time clients
  rpc ListGuestOrganizations(EmptyMessageRequest) returns (OrganizationList) {}
  rpc AddGuest(AddGuestRequest) returns (AddGuestResponse) {}
  rpc CreateGuestOrganization(CreateGuestOrganizationRequest) returns (CreateGuestOrganizationResponse) {}

  // organization settings related requests
  rpc GetSetting(EmptyMessageRequest) returns (OrganizationSettings) {}
  rpc UpdateSetting(OrganizationSettingsUpdate) returns (OrganizationSettings) {}

  // can be used by service providers
  rpc ListServiceReceivers(EmptyMessageRequest) returns (OrganizationList) {}
  rpc CreateServiceReceiver(ServiceReceiverCreateRequest) returns (Organization) {}

  // can be used by service receivers
  rpc ListServiceProvider(EmptyMessageRequest) returns (OrganizationList) {}

  // general organization requests
  rpc ListDisposalSiteOperators(EmptyMessageRequest) returns (OrganizationList) {}
  rpc ListChildrenOrganization(EmptyMessageRequest) returns (OrganizationList) {}
  rpc GetOrganization(OrganizationRequest) returns (Organization) {}
  rpc MyOrganization(EmptyMessageRequest) returns (Organization) {}
}
