syntax = "proto2";

package raccoonai;

import "auth.proto";
import "general.proto";
import "user.proto";

option go_package = "./pb";

message SelfRegistrationRequest {
  required string registration_token = 1 [json_name = "registration_token"];
  required string first_name = 2 [json_name = "first_name"];
  required string last_name = 3 [json_name = "last_name"];
  optional string phone_number = 4 [json_name = "phone_number"];
  optional string email = 5 [json_name = "email"];
  required string password = 6 [json_name = "password"];
  optional string driver_license_number = 7 [json_name = "driver_license_number"];
}

service AuthService {
  rpc Login(LoginRequest) returns (AuthResponse) {}
  rpc Logout(EmptyMessageRequest) returns (MessageResponse) {}
  rpc Protected(EmptyMessageRequest) returns (MessageResponse) {}
  rpc Me(EmptyMessageRequest) returns (MeResponse) {}
  rpc StaticToken(TokenRequest) returns (AuthResponse) {}
  rpc RequestOTP(OTPRequest) returns (MessageResponse) {}
  rpc LoginOTP(LoginOTPRequest) returns (AuthResponse) {}
  rpc ResetPassword(PasswordReset) returns (MessageResponse) {}
  rpc RefreshToken(EmptyMessageRequest) returns (AuthResponse) {}
  rpc ForgotPasswordViaOtp(PasswordResetViaOtp) returns (MessageResponse) {}
  rpc SelfRegisterViaLink(SelfRegistrationRequest) returns (User) {}
}
