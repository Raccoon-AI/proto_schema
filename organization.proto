syntax = "proto2";
package raccoonai;

import "contact.proto";
import "enums.proto";
import "general.proto";
import "google/protobuf/timestamp.proto";
import "organization_settings.proto";

option go_package = "./pb";

message Organization {
  required uint64 id = 1 [json_name = "id"];
  required string name = 2 [json_name = "name"];
  required OrganizationType type = 3 [json_name = "type"];
  required OrganizationStatus status = 4 [json_name = "status"];
  optional uint64 bank_details_id = 5 [json_name = "bank_details_id"];
  optional string bin = 6 [json_name = "bin"];
  optional uint64 primary_contact_id = 7 [json_name = "primary_contact_id"]; // ID of primary org-level contact
  optional string jur_address = 8 [json_name = "jur_address"];
  optional string fact_address = 9 [json_name = "fact_address"];
  optional Contact primary_contact = 10 [json_name = "primary_contact"];
  optional string director_full_name = 11 [json_name = "director_full_name"];
  optional uint64 parent_id = 12 [json_name = "parent_id"];
  optional Organization parent = 13 [json_name = "parent"];
  optional OrganizationSettings organization_settings = 14 [json_name = "organization_settings"];

  required google.protobuf.Timestamp created_at = 101 [json_name = "created_at"];
  optional google.protobuf.Timestamp updated_at = 102 [json_name = "updated_at"];
}

message OrganizationCreateItem {
  required string name = 1 [json_name = "name"];
  required OrganizationType type = 2 [json_name = "type"];
  optional uint64 bank_details_id = 3 [json_name = "bank_details_id"];
  optional string bin = 4 [json_name = "bin"];
  optional string jur_address = 6 [json_name = "jur_address"];
  optional string fact_address = 7 [json_name = "fact_address"];
  optional string director_full_name = 8 [json_name = "director_full_name"];
}

message ContractCreateItem {
  required google.protobuf.Timestamp end_at = 1 [json_name = "end_at"];
}

message OrganizationCreate {
  required string name = 1 [json_name = "name"];
  required OrganizationType type = 2 [json_name = "type"];
  optional string bin = 3 [json_name = "bin"];
  optional string jur_address = 4 [json_name = "jur_address"];
  optional string fact_address = 5 [json_name = "fact_address"];
  optional string director_full_name = 6 [json_name = "director_full_name"];
  optional uint64 parent_id = 7 [json_name = "parent_id"];
}

message ServiceReceiverCreate {
  required OrganizationCreateItem organization = 1 [json_name = "organization"];
  optional ContractCreateItem contract = 2 [json_name = "contract"];
  optional uint64 service_provider_id = 3 [json_name = "service_provider_id"];
  optional string bin = 4 [json_name = "bin"];
}

message OrganizationUpdate {
  required uint64 id = 1 [json_name = "id"];
  optional string name = 2 [json_name = "name"];
  optional OrganizationStatus status = 3 [json_name = "status"];
  optional uint64 bank_details_id = 4 [json_name = "bank_details_id"];
  optional string bin = 5 [json_name = "bin"];
  optional uint64 primary_contact_id = 6 [json_name = "primary_contact_id"];
  optional string jur_address = 7 [json_name = "jur_address"];
  optional string fact_address = 8 [json_name = "fact_address"];
  optional string director_full_name = 9 [json_name = "director_full_name"];
}

message OrganizationListRequest {
  optional OrganizationType type = 1 [json_name = "type"];
  optional OrganizationStatus status = 2 [json_name = "status"];
  optional string search_query = 3 [json_name = "search_query"];
  optional ListFilter list_filter = 10 [json_name = "list_filter"];
}

message OrganizationList {
  repeated Organization organizations = 1 [json_name = "organizations"];
  optional ListInfo list_info = 2 [json_name = "list_info"];
}
